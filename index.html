// ─── Lazy PDF.js ──────────────────────────────────────────────────────────────
let _pdfReady=null;
const loadPDF=()=>{
  if(_pdfReady)return _pdfReady;
  _pdfReady=new Promise((resolve,reject)=>{
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload=()=>{pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";resolve();};
    s.onerror=reject;document.head.appendChild(s);
  });
  return _pdfReady;
};

// ─── Storage ──────────────────────────────────────────────────────────────────
const stoSave=async(k,v)=>{
  try{
    if(window.storage)return !!(await window.storage.set(k,JSON.stringify(v)));
    localStorage.setItem(k,JSON.stringify(v));return true;
  }catch{return false;}
};
const stoLoad=async k=>{
  try{
    if(window.storage){const r=await window.storage.get(k);return r?JSON.parse(r.value):null;}
    const r=localStorage.getItem(k);return r?JSON.parse(r):null;
  }catch{return null;}
};

// ─── Utils ────────────────────────────────────────────────────────────────────
const addD=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
const fmt=(d,s=false)=>d.toLocaleDateString("fr-CA",s?{day:"2-digit",month:"short"}:{day:"numeric",month:"long"});
const toH=t=>{if(!t)return null;const[h,m]=t.split(":").map(Number);return h+(m||0)/60;};
const toStr=h=>{const hh=Math.floor(h),mm=Math.round((h-hh)*60);return`${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}`;};
const calcH=(a,b)=>{if(!a||!b)return 0;const[ah,am]=a.split(":").map(Number),[bh,bm]=b.split(":").map(Number);const d=(bh*60+bm)-(ah*60+am);return d>0?d/60:0;};
const fmtDec=(h,sep)=>h?(Math.round(h*100)/100).toString().replace(".",sep):null;
const fmtHs=h=>{if(!h)return null;const hh=Math.floor(h),mm=Math.round((h-hh)*60);return mm?`${hh}h${String(mm).padStart(2,"0")}`:`${hh}h`;};

const totColor=(tot,maxH)=>maxH&&tot>maxH?"#dc2626":tot>42.5?"#dc2626":tot>40?"#ea580c":"#16a34a";
const normT=v=>{
  if(!v)return"";const s=v.trim();
  if(/^\d{1,2}[,.]\d+$/.test(s)){const[hP,dP]=s.replace(",",".").split(".");return`${String(parseInt(hP)).padStart(2,"0")}:${String(Math.round(parseFloat("0."+dP)*60)).padStart(2,"0")}`;}
  const r=s.replace("h",":");
  if(/^\d{3,4}$/.test(r))return`${r.slice(0,-2).padStart(2,"0")}:${r.slice(-2)}`;
  if(/^\d{1,2}$/.test(r))return`${r.padStart(2,"0")}:00`;
  if(/^\d{1,2}:\d{1,2}$/.test(r)){const[h,m]=r.split(":");return`${h.padStart(2,"0")}:${m.padEnd(2,"0")}`;}
  return v;
};

const Cols=()=>(<colgroup><col style={{width:CPR}}/><col style={{width:CE}}/><col style={{width:CP}}/>{DAYS.map((_,i)=><col key={i} style={{width:CD}}/>)}<col style={{width:CT}}/><col style={{width:CX}}/></colgroup>);

const PrioCell=React.memo(({prio,onCommit})=>{

  if(prio!==prev.current){prev.current=prio;setV(prio===undefined||prio===null?"":String(prio));}

function PartCell({row,onChange}){
  const[lMax,setLMax]=useState(row.maxH||"");
  const[lNote,setLNote]=useState(row.noteP||"");
  const rMax=useRef(row.maxH),rNote=useRef(row.noteP);
  if(row.maxH!==rMax.current){rMax.current=row.maxH;setLMax(row.maxH||"");}
  if(row.noteP!==rNote.current){rNote.current=row.noteP;setLNote(row.noteP||"");}
  if(row.particularite==="Max heures"){
    if(row.maxH)return <span onClick={()=>{onChange("maxH","");setLMax("");}} style={{fontSize:12,color:"#475569",cursor:"pointer",textDecoration:"underline dotted"}}>{row.maxH} heures max</span>;
    return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><PartSelect value={row.particularite} onChange={onChange}/><div style={{display:"flex",alignItems:"center",gap:4}}><input value={lMax} onChange={e=>setLMax(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&lMax.trim()){e.preventDefault();onChange("maxH",lMax.trim());}}} placeholder="h max" maxLength={5} style={{...uSty,width:50,textAlign:"center"}}/>{lMax.trim()&&<span onClick={()=>onChange("maxH",lMax.trim())} style={{fontSize:14,cursor:"pointer",color:"#16a34a",fontWeight:700}}>✔</span>}</div></div>);

  }
  return <PartSelect value={row.particularite} onChange={onChange}/>;
}

// ─── PDF parser ───────────────────────────────────────────────────────────────
async function parsePDF(file,emps,getDispo,skipPrioZero=true){
  await loadPDF();
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const allItems=[];
  for(let p=1;p<=pdf.numPages;p++){const pg=await pdf.getPage(p);(await pg.getTextContent()).items.forEach(it=>{const t=it.str.trim();if(t)allItems.push({t,x:Math.round(it.transform[4]),y:Math.round(it.transform[5])});});}
  allItems.sort((a,b)=>b.y-a.y||a.x-b.x);
  const rePlage=/^(\d{1,2}:\d{2})-(\d{1,2}:\d{2})$/;
  const plageXs=allItems.filter(it=>rePlage.test(it.t)).map(it=>it.x).sort((a,b)=>a-b);
  const clusters=[];
  for(const x of plageXs){const last=clusters[clusters.length-1];if(!last||x-last.max>15)clusters.push({xs:[x],max:x});else{last.xs.push(x);last.max=x;}}
  const colXs=clusters.sort((a,b)=>b.xs.length-a.xs.length).slice(0,7).map(c=>Math.round(c.xs.reduce((s,x)=>s+x,0)/c.xs.length)).sort((a,b)=>a-b);
  const dispItemsRaw=allItems.filter(it=>/^disponibilit[eé]$/i.test(it.t)).map(dispIt=>{const c=allItems.filter(it=>Math.abs(it.y-dispIt.y)<6&&it.x<dispIt.x&&/^\d{1,2}$/.test(it.t)).sort((a,b)=>b.x-a.x);return{dispIt,priorite:c.length?parseInt(c[0].t):9999};}).sort((a,b)=>a.priorite-b.priorite);
  const dispoAvecPrio=dispItemsRaw.map(({dispIt,priorite})=>{
    const dispo=DAYS.map(()=>({debut:"",fin:""}));
    allItems.filter(it=>Math.abs(it.y-dispIt.y)<6&&rePlage.test(it.t)).forEach(it=>{
      const m=it.t.match(rePlage);let best=0,bestDist=Infinity;
      colXs.forEach((cx,i)=>{const d=Math.abs(it.x-cx);if(d<bestDist){bestDist=d;best=i;}});
      const[dh,dm]=m[1].split(":").map(Number),[fh,fm]=m[2].split(":").map(Number);
      const finH=fh+fm/60;dispo[best]={debut:m[1],fin:finH<dh+dm/60?toStr(finH+24):m[2]};
    });
    return{dispo,priorite};
  });
  let matched=0;
  const newEmps=emps.map(e=>({...e,dispo:getDispo(e).map(d=>({...d}))}));
  for(const{dispo,priorite}of dispoAvecPrio){
    if(skipPrioZero&&String(priorite)==="0")continue;
    const idx=newEmps.findIndex(e=>!isBlocked(e.particularite)&&String(e.prio)===String(priorite));
    if(idx>=0){newEmps[idx]={...newEmps[idx],dispo};matched++;}
  }
  return{newEmps,matched};
}

    }else{
      const d=dDay,hasDispo=d.debut||d.fin,kD=rd(row.id,di,"debut"),kF=rd(row.id,di,"fin");
      return(<div style={{display:"flex",alignItems:"center",gap:4}}><div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><input value={d.debut} ref={el=>refs.current[kD]=el} onChange={e=>updDispo(row.id,di,"debut",e.target.value)} onBlur={e=>{blurDispo(row.id,di,"debut",e.target.value);setDfk(null);}} onFocus={e=>{setDfk(kD);selAll(e);}} onKeyDown={e=>onKDDispo(e,row.id,di,"debut")} onPaste={e=>onPasteDispo(e,row.id,di)} maxLength={5} style={tiS(!!d.debut,"#fff",dfk===kD)}/><div style={{width:16,height:1,background:"#e2e8f0"}}/><input value={d.fin} ref={el=>refs.current[kF]=el} onChange={e=>updDispo(row.id,di,"fin",e.target.value)} onBlur={e=>{blurDispo(row.id,di,"fin",e.target.value);setDfk(null);}} onFocus={e=>{setDfk(kF);selAll(e);}} onKeyDown={e=>onKDDispo(e,row.id,di,"fin")} onPaste={e=>onPasteDispo(e,row.id,di)} maxLength={5} style={tiS(!!d.fin,"#fff",dfk===kF)}/></div><span style={{fontSize:10,fontWeight:700,color:"#94a3b8",whiteSpace:"nowrap",visibility:hasDispo?"visible":"hidden",minWidth:20}}>{fmtHs(calcH(d.debut,d.fin))}</span></div>);
    }
  };

  const renderTable=isHoraire=>(
    <div style={{background:"#f1f2f6",boxShadow:"0 1px 6px rgba(0,0,0,.1)"}}>
      <table style={{width:TW,borderCollapse:"collapse",tableLayout:"fixed"}}><Cols/><tbody>
        {emps.map((row,ri)=>{
          const bg=ri%2===0?"#f0f1f7":"#e0e1ed";
          const rowData=isHoraire?row.days:getRawDispo(row);
          return(<tr key={row.id} style={{borderTop:"1px solid #a0a8b8",background:bg,height:60}}>
            <PrioCell prio={row.prio} onCommit={v=>setEmp(row.id,"prio",v)}/>
            {isHoraire
              ?<td style={{padding:"4px 12px 4px 8px",verticalAlign:"middle"}}><div style={{display:"flex",flexDirection:"column",gap:3}}><input placeholder="Prénom" value={row.prenom} onChange={e=>setEmp(row.id,"prenom",e.target.value)} style={niS}/><input placeholder="Nom" value={row.nom} onChange={e=>setEmp(row.id,"nom",e.target.value)} style={niSsub}/></div></td>
              :<td style={{padding:"4px 12px 4px 8px",verticalAlign:"middle"}}><div style={{display:"flex",flexDirection:"column",gap:3}}><span style={{fontSize:13,fontWeight:600,color:"#1e293b"}}>{row.prenom}</span><span style={{fontSize:12,color:"#64748b"}}>{row.nom}</span></div></td>
            }
            <td style={{padding:"4px 8px",verticalAlign:"middle",textAlign:"center",borderLeft:"1px solid #c8cdd8"}}>
              {isHoraire?<span style={{fontSize:11,color:"#64748b"}}>{row.particularite||"—"}</span>:<PartCell row={row} onChange={(f,v)=>setEmp(row.id,f,v)}/>}
            </td>
            {rowData.map((day,di)=>(
              <td key={di} style={{padding:"8px 6px",verticalAlign:"middle",textAlign:"center",...blS(di)}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"center"}}>{renderCells(row,di,day,isHoraire)}</div>
              </td>
            ))}
            <TotalCell id={row.id}/><DeleteCell id={row.id}/>
          </tr>);
        })}
      </tbody>
      {isHoraire&&(<tfoot><tr style={{borderTop:"2px solid #c8cdd8",background:"#f8fafc"}}><td/><td style={{padding:"6px 12px 6px 8px",fontSize:10.5,fontWeight:700,color:"#94a3b8",letterSpacing:"0.5px"}}>TOTAL / JOUR</td><td style={{borderLeft:"1px solid #c8cdd8"}}/>{dayTotals.map((h,di)=>(<td key={di} style={{textAlign:"center",padding:"10px 6px",...blS(di)}}>{h>0?<span style={{fontSize:12,fontWeight:700,color:"#475569"}}>{fmtH(h)}</span>:<span style={{color:"#e2e8f0"}}>—</span>}</td>))}<td style={{textAlign:"center",padding:"10px 8px"}}><span style={{fontSize:13,fontWeight:800,color:"#0f172a"}}>{fmtH(grand)||"—"}</span></td><td/></tr></tfoot>)}
      </table>
      {isHoraire&&<div style={{padding:"12px 18px",borderTop:"1px solid #d1d5db"}}><button onClick={addEmp} style={{background:"none",border:"1.5px dashed #a0a8b8",borderRadius:0,padding:"8px 18px",fontSize:13,color:"#94a3b8",cursor:"pointer",display:"flex",alignItems:"center",gap:7,fontWeight:500}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#2563eb";e.currentTarget.style.color="#2563eb";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="#a0a8b8";e.currentTarget.style.color="#94a3b8";}}><span style={{fontSize:17,lineHeight:1}}>+</span> Ajouter un équipier</button></div>}
      {!isHoraire&&<div style={{padding:"10px 18px",borderTop:"1px solid #d1d5db",background:"#f8fafc",fontSize:11,color:"#94a3b8"}}>💡 Inscris les heures de disponibilité. Les cases vides sont considérées comme indisponibles.</div>}
    </div>
  );

  // ── Side panels ───────────────────────────────────────────────────────────
  const PanelLeft=(
    <div style={panelStyle}>
      <div style={{padding:"4px 4px",borderBottom:"1px solid #f1f5f9",textAlign:"center"}}>
        <img src="./Logo_Cineplex_Divertissement.svg" alt="Cineplex" style={{width:"100%",maxHeight:44,objectFit:"contain"}}/>
      </div>
      <PanelSection label="SEMAINE" first/>
      <div style={{padding:"8px 10px",borderBottom:"1px solid #f1f5f9"}}>
        {[{label:"Total semaine",value:fmtH(grand)||"0",color:"#0f172a"},{label:"Moy. / équipier",value:emps.length?(fmtH(grand/emps.length)||"0"):"—",color:"rgb(0,91,245)"}].map(({label,value,color},i)=>(
          <React.Fragment key={label}>{i>0&&<div style={{height:1,background:"#f1f5f9",margin:"2px 0"}}/>}<div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"6px 0"}}><div style={{fontSize:9,color:"#94a3b8",fontWeight:600,letterSpacing:"0.5px",textTransform:"uppercase"}}>{label}</div><div style={{fontSize:18,fontWeight:800,color,marginTop:2}}>{value}</div></div></React.Fragment>
        ))}
      </div>
      <PanelSection label="NAVIGATION"/>
      {[{id:"horaire",label:"📅 Horaire"},{id:"dispo",label:"📋 Dispos"},{id:"params",label:"⚙️ Params"}].map(({id,label})=>(
        <button key={id} onClick={()=>setPage(id)} style={{border:"none",borderBottom:"1px solid #f1f5f9",padding:"10px 10px",cursor:"pointer",fontSize:11,fontWeight:600,textAlign:"left",background:page===id?"rgb(0,91,245)":"#fff",color:page===id?"#fff":"#475569",width:"100%"}} onMouseEnter={e=>e.currentTarget.style.background=page===id?"rgb(0,91,245)":"#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background=page===id?"rgb(0,91,245)":"#fff"}>{label}</button>
      ))}
      <PanelSection label="SEMAINE"/>
      <div style={{padding:"6px 10px 8px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <button onClick={()=>setWs(d=>addD(d,-7))} style={{background:"none",border:"1.5px solid #e2e8f0",cursor:"pointer",fontSize:14,color:"#64748b",padding:"4px 8px",lineHeight:1,borderRadius:3}}>‹</button>
        <div style={{textAlign:"center"}}><div style={{fontSize:11,fontWeight:700,color:"#0f172a"}}>Sem. {iw}</div><div style={{fontSize:9,color:"#94a3b8",marginTop:2}}>{fmt(ws,true)}</div></div>
        <button onClick={()=>setWs(d=>addD(d,7))} style={{background:"none",border:"1.5px solid #e2e8f0",cursor:"pointer",fontSize:14,color:"#64748b",padding:"4px 8px",lineHeight:1,borderRadius:3}}>›</button>
      </div>
      {savedOk!==null&&<div style={{padding:"4px 10px",borderTop:"1px solid #f1f5f9",textAlign:"center",fontSize:10,color:"#0f172a"}}>{savedOk?"💾 Sauvegarde active":"⚠️ Indisponible"}</div>}
    </div>
  );

  const PanelRight=(
    <div style={panelStyle}>
      <PanelSection label="ATTRIBUTION" first/>
      <PanelBtn onClick={genererTous} green><span style={{fontSize:11,fontWeight:700}}>⚡⚡ Attribuer tous</span></PanelBtn>
      <PanelBtn onClick={genererTousPlus} blue><span style={{fontSize:11,fontWeight:700}}>⚡⚡ Attribuer ++</span></PanelBtn>
      <button onClick={()=>setShowReequMenu(v=>!v)} style={{border:"none",borderBottom:"1px solid #f1f5f9",padding:"9px 10px",cursor:"pointer",fontSize:11,fontWeight:600,color:"#475569",background:showReequMenu?"#f1f5f9":"#fff",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%"}} onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background=showReequMenu?"#f1f5f9":"#fff"}>
        <span>⚖️ Rééquilibrer</span><span style={{fontSize:9,color:"#94a3b8"}}>{showReequMenu?"▲":"▼"}</span>
      </button>
      {showReequMenu&&(<div style={{borderBottom:"1px solid #e2e8f0"}}>{DS.map((_,di)=>(<button key={di} onClick={()=>genererRééquilibrerJour(di)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",border:"none",borderBottom:"1px solid #f8fafc",padding:"6px 14px 6px 18px",cursor:"pointer",background:"#fafafa",fontSize:11,fontWeight:600}} onMouseEnter={e=>e.currentTarget.style.background="#e0f0e8"} onMouseLeave={e=>e.currentTarget.style.background="#fafafa"}><span style={{color:"#475569"}}>{DS[di]}</span>{defBadge(di)}</button>))}</div>)}
      <PanelBtn onClick={genererFermeturePrioritaire}>🔒 Priorité fermeture</PanelBtn>
      <PanelSection label="AJUSTEMENTS"/>
      <div style={{padding:"6px 8px 2px"}}>
        <div style={{fontSize:9,fontWeight:700,color:"#94a3b8",letterSpacing:"0.4px",marginBottom:4}}>JOUR — avancer début</div>
        <div style={{display:"flex",gap:4,marginBottom:8}}><SmallBtn onClick={()=>genererEtirer(14,"debut")} label="14h"/><SmallBtn onClick={()=>genererEtirer(16,"debut")} label="16h"/></div>
        <div style={{fontSize:9,fontWeight:700,color:"#94a3b8",letterSpacing:"0.4px",marginBottom:4}}>SOIR — prolonger fin</div>
        <div style={{display:"flex",gap:4,marginBottom:6}}><SmallBtn onClick={()=>genererEtirer(20,"fin")} label="20h"/><SmallBtn onClick={()=>genererEtirer(22,"fin")} label="22h"/></div>
      </div>
      <PanelSection label="QUARTS 4H"/>
      <div style={{display:"flex",gap:4,padding:"6px 8px"}}><SmallBtn onClick={()=>genererQuart4h("jour")} label="☀️ 14–18h"/><SmallBtn onClick={()=>genererQuart4h("soir")} label="🌙 18–22h"/></div>
      <PanelSection label="DONNÉES"/>
      <PanelBtn onClick={loadTestData}>🔄 Par défaut</PanelBtn>
      <PanelBtn onClick={()=>importRef.current.click()}>📥 Importer</PanelBtn>
      <PanelSection label="HISTORIQUE"/>
      <div style={{display:"flex",borderBottom:"1px solid #f1f5f9"}}>
        <button onClick={undo} style={{flex:1,border:"none",borderRight:"1px solid #f1f5f9",padding:"9px 0",cursor:"pointer",fontSize:16,background:"#fff",color:"#475569"}} onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>↩</button>
        <button onClick={redo} style={{flex:1,border:"none",padding:"9px 0",cursor:"pointer",fontSize:16,background:"#fff",color:"#475569"}} onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>↪</button>
      </div>
      <PanelSection label="RÉINITIALISER"/>
      <button onClick={effacerHoraire} style={rstS(confirmHoraire)} onMouseEnter={e=>e.currentTarget.style.background=confirmHoraire?"#fee2e2":"#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background=confirmHoraire?"#fef2f2":"#fff"}>{confirmHoraire?"⚠️ Confirmer?":"🗑 Effacer horaire"}</button>
      <button onClick={effacerDispos} style={rstS(confirmDispo)} onMouseEnter={e=>e.currentTarget.style.background=confirmDispo?"#fee2e2":"#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background=confirmDispo?"#fef2f2":"#fff"}>{confirmDispo?"⚠️ Confirmer?":"🗑 Effacer dispos"}</button>
    </div>
  );

  // ── Render ────────────────────────────────────────────────────────────────
  return(
    <div style={{fontFamily:"'Inter','Segoe UI',sans-serif",background:"rgb(14,27,52)",minHeight:"100vh",padding:"24px 12px",display:"flex",justifyContent:"center",gap:12,alignItems:"flex-start"}}>
      <input ref={importRef} type="file" accept=".pdf" style={{display:"none"}} onChange={e=>{if(e.target.files[0])handleImport(e.target.files[0]);e.target.value="";}}/>
      {genMsg&&<div style={{position:"fixed",bottom:24,right:16,zIndex:2000,padding:"10px 16px",background:"#dcfce7",border:"1.5px solid #16a34a",fontSize:12,fontWeight:600,color:"#15803d",borderRadius:6,boxShadow:"0 4px 12px rgba(0,0,0,.15)"}}>{genMsg}</div>}
      {importMsg&&<div style={{position:"fixed",bottom:genMsg?72:24,right:16,zIndex:2000,padding:"10px 16px",background:"#dbeafe",border:"1.5px solid #3b82f6",fontSize:12,fontWeight:600,color:"#1d4ed8",borderRadius:6,boxShadow:"0 4px 12px rgba(0,0,0,.15)"}}>{importMsg}</div>}

      {PanelLeft}
      <div style={{width:TW}}>
        {page==="params"&&(
          <div style={{background:"#fff",boxShadow:"0 1px 6px rgba(0,0,0,.1)",padding:"32px",borderRadius:4}}>
            <h2 style={{margin:"0 0 6px",fontSize:18,fontWeight:800,color:"#0f172a"}}>⚙️ Paramètres</h2>
            <p style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>Contrôle le calcul des effectifs, la génération automatique et l'import des disponibilités.</p>
            <ParamSection label="CALCUL DES EFFECTIFS" color="#dbeafe">
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:16}}>
                <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:6,padding:"14px"}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#2563eb",letterSpacing:"0.5px",marginBottom:10}}>TRANCHE JOUR</div>
                  <ParamRow label="Décalage après ouverture" value={params.jourDecalage} onChange={v=>setP("jourDecalage",v)} unit="h" step="0.5"/>
                  <ParamRow label="Heure limite journée" value={params.jourLimite} onChange={v=>setP("jourLimite",v)} unit="h" step="0.5"/>
                  <ParamRow label="Pondération intermédiaire" value={params.jourPoids} onChange={v=>setP("jourPoids",v)} unit="×" step="0.25"/>
                  <div style={{marginTop:8,fontSize:10,color:"#1d4ed8",lineHeight:1.7,padding:"8px",background:"#dbeafe",borderRadius:4}}>Début &lt; ouverture + {params.jourDecalage}h → <b>1×</b><br/>Début entre {params.jourDecalage}h et {params.jourLimite}h → <b>{params.jourPoids}×</b><br/>Début après {params.jourLimite}h → <b>0×</b></div>
                </div>
                <div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:6,padding:"14px"}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#ea580c",letterSpacing:"0.5px",marginBottom:10}}>TRANCHE SOIR</div>
                  <ParamRow label="Début tranche soir basse" value={params.soirDebut} onChange={v=>setP("soirDebut",v)} unit="h" step="0.5"/>
                  <ParamRow label="Fin tranche soir basse" value={params.soirLimite} onChange={v=>setP("soirLimite",v)} unit="h" step="0.5"/>
                  <ParamRow label="Pondération intermédiaire" value={params.soirPoids} onChange={v=>setP("soirPoids",v)} unit="×" step="0.25"/>
                  <div style={{marginTop:8,fontSize:10,color:"#c2410c",lineHeight:1.7,padding:"8px",background:"#ffedd5",borderRadius:4}}>Fin entre {params.soirDebut}h et {params.soirLimite}h → <b>{params.soirPoids}×</b><br/>Fin après {params.soirLimite}h → <b>1×</b><br/>Fin avant {params.soirDebut}h → <b>0×</b></div>
                </div>
              </div>
              <ToggleRow label="Tolérance — vert pâle si proche de la cible" sub="Affiche les effectifs en vert pâle quand ils sont dans la marge définie ci-dessous." param={params.tolEffOn} setParam={v=>setP("tolEffOn",v)}/>
              {params.tolEffOn&&<ParamRow label="Marge de tolérance (±)" value={params.tolEff} onChange={v=>setP("tolEff",v)} unit="±" step="0.25"/>}
            </ParamSection>
            <ParamSection label="GÉNÉRATION AUTOMATIQUE" color="#bbf7d0">
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:"#64748b",letterSpacing:"0.4px",marginBottom:10}}>CONTRAINTES</div>
                  <ParamRow label="Durée minimum d'un quart" value={params.genMinQuart} onChange={v=>setP("genMinQuart",v)} unit="h" step="0.5"/>
                  <ParamRow label="Maximum d'heures / semaine" value={params.genMaxHeures} onChange={v=>setP("genMaxHeures",parseFloat(v)||0)} unit="h" step="0.5"/>
                  <ParamRow label="Équipiers à l'ouverture" value={params.genNbOuverture} onChange={v=>setP("genNbOuverture",v)} unit="pers" step="1"/>
                  <ParamRow label="Délai après quota ouverture" value={params.genDelaiApresOuverture} onChange={v=>setP("genDelaiApresOuverture",v)} unit="h" step="0.25"/>
                  <ParamRow label="Éligible ouverture si dispo avant" value={params.genSeuilOuverture} onChange={v=>setP("genSeuilOuverture",v)} unit="h" step="0.5"/>
                  <ParamRow label="Fermetures cinéma max" value={params.genNbFermetureCinema} onChange={v=>setP("genNbFermetureCinema",v)} unit="pers" step="1"/>
                </div>
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:"#64748b",letterSpacing:"0.4px",marginBottom:10}}>OPTIONS</div>
                  <ToggleRow label="Démarrer à l'heure d'ouverture" sub="Si la dispo commence avant le seuil, le quart part de l'ouverture même si la dispo commence après." param={params.genOuvertureFlexible} setParam={v=>setP("genOuvertureFlexible",v)}/>
                  <div style={{marginTop:4}}/>
                  <ToggleRow label="Écraser les quarts existants" sub="Lors d'une génération, les quarts déjà saisis pourront être remplacés." param={params.genEcraser} setParam={v=>setP("genEcraser",v)}/>
                </div>
              </div>
              <div style={{marginTop:16,borderTop:"1px solid #e2e8f0",paddingTop:16}}>
                <ToggleRow label="Fermeture comptoir" sub="Raccourcit la fin du quart des équipiers au comptoir selon les règles ci-dessous." param={params.genFermetureComptoir} setParam={v=>setP("genFermetureComptoir",v)}/>
                {params.genFermetureComptoir&&(<div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:6,padding:"14px",marginTop:4}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}><div><div style={{fontSize:11,fontWeight:700,color:"#16a34a",marginBottom:8}}>SEUIL HAUT</div><ParamRow label="Fermeture ≥" value={params.genSeuilHaut} onChange={v=>setP("genSeuilHaut",v)} unit="h" step="0.5"/><ParamRow label="Fin comptoir" value={params.genComptoirHaut} onChange={v=>setP("genComptoirHaut",v)} unit="h" step="0.5"/></div><div><div style={{fontSize:11,fontWeight:700,color:"#16a34a",marginBottom:8}}>SEUIL BAS</div><ParamRow label={`Entre X et ${params.genSeuilHaut}h`} value={params.genSeuilBas} onChange={v=>setP("genSeuilBas",v)} unit="h" step="0.5"/><ParamRow label="Fin comptoir" value={params.genComptoirBas} onChange={v=>setP("genComptoirBas",v)} unit="h" step="0.5"/></div></div><div style={{marginTop:8,fontSize:10,color:"#15803d",background:"#dcfce7",padding:"6px 10px",borderRadius:4}}>≥ {params.genSeuilHaut}h → comptoir à {params.genComptoirHaut}h &nbsp;·&nbsp; entre {params.genSeuilBas}h et {params.genSeuilHaut}h → comptoir à {params.genComptoirBas}h</div></div>)}
              </div>
            </ParamSection>
            <ParamSection label="IMPORT & DISPONIBILITÉS" color="#fef9c3">
              <ToggleRow label="Corriger les fins de dispo en format 12h" sub="Une fin saisie à ex. 11:00 sera convertie en 23:00 (ajout de 12h si inférieure au seuil)." param={params.dispoFinCorrection} setParam={v=>setP("dispoFinCorrection",v)}/>
              {params.dispoFinCorrection&&<ParamRow label="Seuil de correction (fin < Xh → +12h)" value={params.dispoFinSeuil} onChange={v=>setP("dispoFinSeuil",v)} unit="h" step="1"/>}
              <div style={{marginTop:12}}/>
              <ToggleRow label="Ignorer les disponibilités en priorité 0" sub="Lors de l'import PDF, les lignes associées au numéro de priorité 0 seront ignorées." param={params.dispoSkipPrioZero} setParam={v=>setP("dispoSkipPrioZero",v)}/>
            </ParamSection>
            <ParamSection label="FORMAT D'AFFICHAGE" color="#e2e8f0">
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div><div style={{fontSize:12,color:"#475569",fontWeight:500}}>Séparateur décimal</div><div style={{fontSize:10,color:"#94a3b8",marginTop:2}}>Affichage des totaux (ex. 7,5 ou 7.5)</div></div>
                <div style={{display:"flex",gap:8}}><ToggleBtn val="," cur={sep} onClick={v=>setP("sepDecimal",v)} label="Virgule  1,5"/><ToggleBtn val="." cur={sep} onClick={v=>setP("sepDecimal",v)} label="Point  1.5"/></div>
              </div>
            </ParamSection>
            <div style={{marginTop:24,display:"flex",justifyContent:"flex-end",gap:8}}>
              <button onClick={()=>setParams(DEF_P)} style={{background:"none",border:"1.5px solid #e2e8f0",padding:"8px 18px",cursor:"pointer",fontSize:13,color:"#64748b",borderRadius:4}}>Réinitialiser</button>
              <button onClick={()=>setPage("horaire")} style={{background:"#1e293b",border:"none",padding:"8px 18px",cursor:"pointer",fontSize:13,color:"#fff",fontWeight:600,borderRadius:4}}>← Retour</button>
            </div>
          </div>
        )}
        {(page==="dispo"||page==="horaire")&&(<>
          <StickyHeader {...stickyProps}/>
          {renderTable(page==="horaire")}
        </>)}
      </div>
      {PanelRight}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
