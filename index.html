  const r=s.replace("h",":");
  if(/^\d{3,4}$/.test(r))return`${r.slice(0,-2).padStart(2,"0")}:${r.slice(-2)}`;
  if(/^\d{1,2}$/.test(r))return`${r.padStart(2,"0")}:00`;

async function parsePDF(file,emps,getDispo){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const allItems=[];
  for(let p=1;p<=pdf.numPages;p++){
    const pg=await pdf.getPage(p);
    (await pg.getTextContent()).items.forEach(it=>{const t=it.str.trim();if(t)allItems.push({t,x:Math.round(it.transform[4]),y:Math.round(it.transform[5])});});
  }
  allItems.sort((a,b)=>b.y-a.y||a.x-b.x);
  const rePlage=/^(\d{1,2}:\d{2})-(\d{1,2}:\d{2})$/;
  const plageXs=allItems.filter(it=>rePlage.test(it.t)).map(it=>it.x).sort((a,b)=>a-b);
  const clusters=[];
  for(const x of plageXs){const last=clusters[clusters.length-1];if(!last||x-last.max>15)clusters.push({xs:[x],max:x});else{last.xs.push(x);last.max=x;}}
  const colXs=clusters.sort((a,b)=>b.xs.length-a.xs.length).slice(0,7).map(c=>Math.round(c.xs.reduce((s,x)=>s+x,0)/c.xs.length)).sort((a,b)=>a-b);
  const dispItems=allItems
    .filter(it=>/^disponibilit[eé]$/i.test(it.t))
    .map(dispIt=>{const c=allItems.filter(it=>Math.abs(it.y-dispIt.y)<6&&it.x<dispIt.x&&/^\d{1,2}$/.test(it.t)).sort((a,b)=>b.x-a.x);return{dispIt,priorite:c.length?parseInt(c[0].t):9999};})
    .sort((a,b)=>a.priorite-b.priorite).map(({dispIt})=>dispIt);
  const dispoLignes=dispItems.map(dispIt=>{
    const dispo=DAYS.map(()=>({debut:"",fin:""}));
    allItems.filter(it=>Math.abs(it.y-dispIt.y)<6&&rePlage.test(it.t)).forEach(it=>{
      const m=it.t.match(rePlage);let best=0,bestDist=Infinity;
      colXs.forEach((cx,i)=>{const d=Math.abs(it.x-cx);if(d<bestDist){bestDist=d;best=i;}});
      const[dh,dm]=m[1].split(":").map(Number),[fh,fm]=m[2].split(":").map(Number);
      const finH=fh+fm/60;
      dispo[best]={debut:m[1],fin:finH<dh+dm/60?toStr(finH+24):m[2]};
    });
    return dispo;
  });
  let matched=0,pdfIdx=0;
  const newEmps=emps.map(e=>({...e,dispo:getDispo(e).map(d=>({...d}))}));
  for(let ai=0;ai<emps.length&&pdfIdx<dispoLignes.length;ai++){
    if(isBlocked(emps[ai].particularite))continue;
    newEmps[ai]={...newEmps[ai],dispo:dispoLignes[pdfIdx++]};matched++;
  }
  return{newEmps,matched};
}

  useEffect(()=>{

      if(savedCin&&savedCin.length===7)setCin(savedCin);
      if(savedEff&&savedEff.length===7)setEff(savedEff);
      if(savedParts){setEmps(l=>l.map(emp=>{const p=savedParts[emp.id];if(!p)return emp;return{...emp,particularite:p.particularite||"",maxH:p.maxH||"",noteP:p.noteP||""};}));}
      const testOk=await stoSave("horaire:test","ok");
      setSavedOk(testOk);
      setLoaded(true);
    })();
  },[]);
  useEffect(()=>{if(loaded)stoSave(SK.cin,cin);},[cin,loaded]);
  useEffect(()=>{if(loaded)stoSave(SK.eff,eff);},[eff,loaded]);
  useEffect(()=>{
    if(!loaded)return;
    const parts={};
    emps.forEach(e=>{parts[e.id]={particularite:e.particularite,maxH:e.maxH,noteP:e.noteP};});
    stoSave(SK.parts,parts);
  },[emps,loaded]);

  const sep=params.sepDecimal;
  const fmtH=useCallback(h=>fmtDec(h,sep),[sep]);
  const getDispo=useCallback(emp=>emp.dispo&&emp.dispo.length===7?emp.dispo:mkDispo(),[]);
  const getMaxH=useCallback(emp=>emp.particularite==="Max heures"&&emp.maxH?parseFloat(emp.maxH):params.genMaxHeures,[params.genMaxHeures]);
  const empIdx=useMemo(()=>{const m={};emps.forEach((e,i)=>m[e.id]=i);return m;},[emps]);
  const rowTotals=useMemo(()=>{const m={};emps.forEach(e=>{m[e.id]=e.days.reduce((s,d)=>s+calcH(d.debut,d.fin),0);});return m;},[emps]);
  const grand=useMemo(()=>Object.values(rowTotals).reduce((s,v)=>s+v,0),[rowTotals]);
  const dayTotals=useMemo(()=>DAYS.map((_,di)=>emps.reduce((s,x)=>s+calcH(x.days[di].debut,x.days[di].fin),0)),[emps]);
  const effCalcs=useMemo(()=>DAYS.map((_,di)=>{
    const ouv=toH(cin[di].ouverture);if(ouv===null)return{jour:0,soir:0};
    const thr=ouv+params.jourDecalage;let jour=0,soir=0;
    emps.forEach(row=>{
      if(isBlocked(row.particularite))return;
      const d=toH(row.days[di].debut),f=toH(row.days[di].fin);
      if(d!==null){if(d<thr)jour+=1;else if(d<params.jourLimite)jour+=params.jourPoids;}
      if(f!==null){if(f>=params.soirDebut&&f<=params.soirLimite)soir+=params.soirPoids;else if(f>params.soirLimite)soir+=1;}
    });
    return{jour:Math.round(jour*10)/10,soir:Math.round(soir*10)/10};
  }),[emps,cin,params.jourDecalage,params.jourLimite,params.jourPoids,params.soirDebut,params.soirLimite,params.soirPoids]);
  const wd=useMemo(()=>DAYS.map((_,i)=>addD(ws,i)),[ws]);
  const wl=useMemo(()=>`${fmt(ws)} au ${fmt(addD(ws,6))}`,[ws]);
  const iw=useMemo(()=>isoW(ws),[ws]);
  const getFerEff=useCallback(ferStr=>{
    if(!params.genFermetureComptoir)return ferStr;

  const getCell=(row,c,il,isF)=>{if(!row)return"";const val=il?row[c*2+(isF?1:0)]:row[c];return val?val.trim():"";};
  const splitPaste=(text,di)=>{const rows=text.trimEnd().split("\n").map(r=>r.split("\t"));const f=filterEmpty(rows);return{filtered:f,interleaved:f[0].length>=(7-di)*2};};

  const calcEffDi=(newDays,di,ouvH,ei,debut,fin)=>{
    const thr=ouvH+params.jourDecalage;let jour=0,soir=0;
    emps.forEach((row,i)=>{
      if(isBlocked(row.particularite))return;

  const assignerUnJour=(newDays,ei,di)=>{

  const genererTous=()=>{

  const genererEtirer=(heure,sens)=>{

  const buildCandidats=(newDays,di,ouvH,ferH,finCible)=>{

        if(toH(fin)>=ferH-EPS)ferCin++;if(debutReel<=ouvH+EPS)ouvCount++;
        assigns++;ceJour++;
      }
    }

                  const bg=ri%2===0?"#f0f1f7":"#e0e1ed";
                  return(<tr key={row.id} style={{borderTop:"1px solid #a0a8b8",background:bg,height:60}}>
                    <td style={{padding:"4px 12px 4px 18px",verticalAlign:"middle"}}><div style={{display:"flex",flexDirection:"column",gap:3}}><span style={{fontSize:13,fontWeight:600,color:"#1e293b",fontFamily:"'Inter','Segoe UI',sans-serif"}}>{row.prenom}</span><span style={{fontSize:12,color:"#64748b",fontFamily:"'Inter','Segoe UI',sans-serif"}}>{row.nom}</span></div></td>
                    <td style={{padding:"4px 8px",verticalAlign:"middle",textAlign:"center",borderLeft:"1px solid #c8cdd8"}}><PartCell row={row} onChange={(f,v)=>setEmp(row.id,f,v)}/></td>
                    {dispo.map((d,di)=>{const hasDispo=d.debut||d.fin;return(
                      <td key={di} style={{padding:"8px 6px",verticalAlign:"middle",textAlign:"center",...blS(di)}}>
                        {blk?(<div style={{height:52,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:28,height:2,borderRadius:2,background:"#c8cdd8"}}/></div>):(
                          <div style={{display:"flex",alignItems:"center",justifyContent:"center"}}>
                            <div style={{display:"flex",alignItems:"center",gap:4}}>
                              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                                <input type="text" value={d.debut} onChange={e=>updDispo(row.id,di,"debut",e.target.value)} onBlur={e=>blurDispo(row.id,di,"debut",e.target.value)} onPaste={e=>onPasteDispo(e,row.id,di)} maxLength={5} style={tiS(!!d.debut,"#fff",false)}/>
                                <div style={{width:16,height:1,background:"#e2e8f0"}}/>
                                <input type="text" value={d.fin} onChange={e=>updDispo(row.id,di,"fin",e.target.value)} onBlur={e=>blurDispo(row.id,di,"fin",e.target.value)} onPaste={e=>onPasteDispo(e,row.id,di)} maxLength={5} style={tiS(!!d.fin,"#fff",false)}/>
                              </div>
                              <span style={{fontSize:10,fontWeight:700,color:"#94a3b8",whiteSpace:"nowrap",visibility:hasDispo?"visible":"hidden",minWidth:20}}>{fmtHs(calcH(d.debut,d.fin))}</span>
                            </div>
                          </div>
                        )}
                      </td>);})}
                    <TotalCell id={row.id}/><DeleteCell id={row.id}/>
                  </tr>);
                })}
              </tbody>
            </table>
            <div style={{padding:"10px 18px",borderTop:"1px solid #d1d5db",background:"#f8fafc",fontSize:11,color:"#94a3b8"}}>💡 Inscris les heures de disponibilité. Les cases vides sont considérées comme indisponibles.</div>
          </div>
        </>)}

        {page==="horaire"&&(<>
          <StickyHeader/>
          <div style={{background:"#f1f2f6",boxShadow:"0 1px 6px rgba(0,0,0,.1)"}}>
            <table style={{width:TW,borderCollapse:"collapse",tableLayout:"fixed"}}><Cols/>
              <tbody>
                {emps.map((row,ri)=>{
                  const blk=isBlocked(row.particularite);
                  const bg=ri%2===0?"#f0f1f7":"#e0e1ed";
                  return(<tr key={row.id} style={{borderTop:"1px solid #a0a8b8",background:bg,height:60}}>
                    <td style={{padding:"4px 12px 4px 18px",verticalAlign:"middle"}}><div style={{display:"flex",flexDirection:"column",gap:3}}><input placeholder="Prénom" value={row.prenom} onChange={e=>setEmp(row.id,"prenom",e.target.value)} style={niS}/><input placeholder="Nom" value={row.nom} onChange={e=>setEmp(row.id,"nom",e.target.value)} style={niSsub}/></div></td>
                    <td style={{padding:"4px 8px",verticalAlign:"middle",textAlign:"center",borderLeft:"1px solid #c8cdd8"}}><span style={{fontSize:11,color:"#64748b"}}>{row.particularite||"—"}</span></td>
                    {row.days.map((day,di)=>{
                      const h=calcH(day.debut,day.fin),ch=cin[di];
                      const mO=!!(day.debut&&day.debut===ch.ouverture),mC=!!(day.fin&&day.fin===ch.fermeture);
                      const kD=rk(row.id,di,"debut"),kF=rk(row.id,di,"fin");
                      return(<td key={di} style={{padding:"8px 6px",verticalAlign:"middle",textAlign:"center",...blS(di)}}>
                        {blk?(<div style={{height:52,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:28,height:2,borderRadius:2,background:"#c8cdd8"}}/></div>):(
                          <div style={{display:"flex",alignItems:"center",justifyContent:"center"}}>
                            <div style={{display:"flex",alignItems:"center",gap:4}}>
                              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                                <input type="text" value={day.debut} ref={el=>refs.current[kD]=el} onChange={e=>updDay(row.id,di,"debut",e.target.value)} onBlur={e=>{blurDay(row.id,di,"debut",e.target.value);setFk(null);}} onFocus={()=>setFk(kD)} onClick={e=>e.target.select()} onKeyDown={e=>onKD(e,row.id,di,"debut")} onPaste={e=>onPaste(e,row.id,di)} maxLength={5} autoComplete="off" style={tiS(!!day.debut,mO?"#dbeafe":"#fff",fk===kD)}/>
                                <div style={{width:16,height:1,background:"#e2e8f0"}}/>
                                <input type="text" value={day.fin} ref={el=>refs.current[kF]=el} onChange={e=>updDay(row.id,di,"fin",e.target.value)} onBlur={e=>{blurDay(row.id,di,"fin",e.target.value);setFk(null);}} onFocus={()=>setFk(kF)} onClick={e=>e.target.select()} onKeyDown={e=>onKD(e,row.id,di,"fin")} maxLength={5} autoComplete="off" style={tiS(!!day.fin,mC?"#fff3e0":"#fff",fk===kF)}/>
                              </div>
                              <span style={{fontSize:10,fontWeight:700,color:h>0&&h<4?"#fb7185":"#94a3b8",whiteSpace:"nowrap",visibility:h>0?"visible":"hidden",minWidth:20}}>{fmtHs(h)}</span>
                            </div>
                          </div>
                        )}
                      </td>);
                    })}
                    <TotalCell id={row.id}/><DeleteCell id={row.id}/>
                  </tr>);
                })}
              </tbody>
              <tfoot>
                <tr style={{borderTop:"2px solid #c8cdd8",background:"#f8fafc"}}>
                  <td style={{padding:"6px 12px 6px 18px",fontSize:10.5,fontWeight:700,color:"#94a3b8",letterSpacing:"0.5px"}}>TOTAL / JOUR</td>
                  <td style={{borderLeft:"1px solid #c8cdd8"}}/>
                  {dayTotals.map((h,di)=>(<td key={di} style={{textAlign:"center",padding:"10px 6px",...blS(di)}}>{h>0?<span style={{fontSize:12,fontWeight:700,color:"#475569"}}>{fmtH(h)}</span>:<span style={{color:"#e2e8f0"}}>—</span>}</td>))}
                  <td style={{textAlign:"center",padding:"10px 8px"}}><span style={{fontSize:13,fontWeight:800,color:"#0f172a"}}>{fmtH(grand)||"—"}</span></td>
                  <td/>
                </tr>
              </tfoot>
            </table>
            <div style={{padding:"12px 18px",borderTop:"1px solid #d1d5db"}}>
              <button onClick={addEmp} style={{background:"none",border:"1.5px dashed #a0a8b8",borderRadius:0,padding:"8px 18px",fontSize:13,color:"#94a3b8",cursor:"pointer",display:"flex",alignItems:"center",gap:7,fontWeight:500}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#2563eb";e.currentTarget.style.color="#2563eb";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="#a0a8b8";e.currentTarget.style.color="#94a3b8";}}>
                <span style={{fontSize:17,lineHeight:1}}>+</span> Ajouter un équipier
              </button>
            </div>
          </div>
        </>)}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
