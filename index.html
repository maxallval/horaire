// ─── PDF parser (match par numéro de priorité) ────────────────────────────────
async function parsePDF(file,emps,getDispo,skipPrioZero=true){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const allItems=[];
  for(let p=1;p<=pdf.numPages;p++){
    const pg=await pdf.getPage(p);
    (await pg.getTextContent()).items.forEach(it=>{const t=it.str.trim();if(t)allItems.push({t,x:Math.round(it.transform[4]),y:Math.round(it.transform[5])});});
  }
  allItems.sort((a,b)=>b.y-a.y||a.x-b.x);
  const rePlage=/^(\d{1,2}:\d{2})-(\d{1,2}:\d{2})$/;
  const plageXs=allItems.filter(it=>rePlage.test(it.t)).map(it=>it.x).sort((a,b)=>a-b);
  const clusters=[];
  for(const x of plageXs){const last=clusters[clusters.length-1];if(!last||x-last.max>15)clusters.push({xs:[x],max:x});else{last.xs.push(x);last.max=x;}}
  const colXs=clusters.sort((a,b)=>b.xs.length-a.xs.length).slice(0,7).map(c=>Math.round(c.xs.reduce((s,x)=>s+x,0)/c.xs.length)).sort((a,b)=>a-b);

  // Garder la priorité associée à chaque ligne de dispo
  const dispItemsRaw=allItems
    .filter(it=>/^disponibilit[eé]$/i.test(it.t))
    .map(dispIt=>{
      const c=allItems.filter(it=>Math.abs(it.y-dispIt.y)<6&&it.x<dispIt.x&&/^\d{1,2}$/.test(it.t)).sort((a,b)=>b.x-a.x);
      return{dispIt,priorite:c.length?parseInt(c[0].t):9999};
    })
    .sort((a,b)=>a.priorite-b.priorite);

  const dispoAvecPrio=dispItemsRaw.map(({dispIt,priorite})=>{
    const dispo=DAYS.map(()=>({debut:"",fin:""}));
    allItems.filter(it=>Math.abs(it.y-dispIt.y)<6&&rePlage.test(it.t)).forEach(it=>{
      const m=it.t.match(rePlage);let best=0,bestDist=Infinity;
      colXs.forEach((cx,i)=>{const d=Math.abs(it.x-cx);if(d<bestDist){bestDist=d;best=i;}});
      const[dh,dm]=m[1].split(":").map(Number),[fh,fm]=m[2].split(":").map(Number);
      const finH=fh+fm/60;
      dispo[best]={debut:m[1],fin:finH<dh+dm/60?toStr(finH+24):m[2]};
    });
    return{dispo,priorite};
  });

  let matched=0;
  const newEmps=emps.map(e=>({...e,dispo:getDispo(e).map(d=>({...d}))}));

  for(const{dispo,priorite}of dispoAvecPrio){
    if(skipPrioZero&&String(priorite)==="0")continue;
    // Chercher l'employé dont le numéro de priorité correspond
    const idx=newEmps.findIndex(e=>!isBlocked(e.particularite)&&String(e.prio)===String(priorite));
    if(idx>=0){newEmps[idx]={...newEmps[idx],dispo};matched++;}
  }
  return{newEmps,matched};
}

  const cap=l=>{if(before.current===null)before.current=JSON.stringify(l);};

  const blurDay=(id,di,f,v)=>{commit();const n=normT(v);setEmps(l=>l.map(x=>x.id!==id?x:{...x,days:x.days.map((d,i)=>i===di?{...d,[f]:n}:d)}));};
  const delDay=(id,di,f)=>setEmps(l=>{cap(l);commit();return l.map(x=>x.id!==id?x:{...x,days:x.days.map((d,i)=>i===di?{...d,[f]:""}:d)});});
  const updCin=(di,f,v)=>setCin(l=>{capCin(l);return l.map((x,i)=>i===di?{...x,[f]:v}:x);});
  const blurCin=(di,f,v)=>{commitCin();setCin(l=>l.map((x,i)=>i===di?{...x,[f]:normT(v)}:x));};
  const delCin=(di,f)=>setCin(l=>{capCin(l);commitCin();return l.map((x,i)=>i===di?{...x,[f]:""}:x);});
  const updDispo=(id,di,f,v)=>setEmps(l=>l.map(x=>x.id!==id?x:{...x,dispo:(x.dispo&&x.dispo.length===7?x.dispo:mkDispo()).map((d,i)=>i===di?{...d,[f]:v}:d)}));
  const blurDispo=(id,di,f,v)=>setEmps(l=>l.map(x=>x.id!==id?x:{...x,dispo:(x.dispo&&x.dispo.length===7?x.dispo:mkDispo()).map((d,i)=>i===di?{...d,[f]:normT(v)}:d)}));
  const setEmp=(id,f,v)=>setEmps(l=>l.map(x=>x.id===id?{...x,[f]:v}:x));

  const clearOnType=useRef(new Set());
  const rk=(eid,di,f)=>`${eid}-${di}-${f}`;

  const rd=(eid,di,f)=>`d-${eid}-${di}-${f}`;
  const focusRef=k=>{if(refs.current[k])refs.current[k].focus();};

  const onKD=(e,eid,di,f)=>{

    if(e.key==="ArrowUp"){e.preventDefault();const pv=emps[empIdx[eid]-1];if(pv)focusRef(rk(pv.id,di,f));return;}
    if(e.key==="ArrowRight"){e.preventDefault();if(di<6)focusRef(rk(eid,di+1,f));return;}
    if(e.key==="ArrowLeft"){e.preventDefault();if(di>0)focusRef(rk(eid,di-1,f));return;}
    if(e.key==="Enter"){e.preventDefault();blurDay(eid,di,f,v);setTimeout(()=>focusNext(eid,di,f),0);return;}
    if((e.key==="Delete"||e.key==="Backspace")&&v){e.preventDefault();delDay(eid,di,f);}
    if(e.key.length===1&&!e.ctrlKey&&!e.altKey&&!e.metaKey&&clearOnType.current.has(rk(eid,di,f))){
      clearOnType.current.delete(rk(eid,di,f));e.preventDefault();updDay(eid,di,f,e.key);return;
    }
  };
  const onCinKD=(e,di,f)=>{
    const v=e.target.value;

    if(e.ctrlKey&&e.key==="z"){e.preventDefault();undoCin();return;}

  const getCell=(row,c,il,isF)=>{if(!row)return"";const val=il?row[c*2+(isF?1:0)]:row[c];return val?val.trim():"";};

  const onPasteDispo=(e,eid,di)=>{

    setEmps(l=>l.map((x,ei)=>{const ri=ei-s;if(ri<0)return x;let dR,fR;if(il){if(ri>=f.length)return x;dR=fR=f[ri];}else{const b=ri*2;if(b>=f.length)return x;dR=f[b];fR=f[b+1]||[];}const nd=rawDispo(x).map((d,dj)=>{if(dj<di)return d;const c=dj-di;return{debut:normT(getCell(dR,c,il,false))||d.debut,fin:normT(getCell(il?dR:fR,c,il,true))||d.fin};});return{...x,dispo:nd};}));

  const onPasteCin=(e,di)=>{

  };

  const focusNextDispo=(eid,di,f)=>{
    if(f==="debut")return focusRef(rd(eid,di,"fin"));
    if(di<6)return focusRef(rd(eid,di+1,"debut"));
    const nx=emps[empIdx[eid]+1];if(nx)focusRef(rd(nx.id,0,"debut"));
  };
  const onKDDispo=(e,eid,di,f)=>{
    const v=e.target.value;
    if(e.key==="ArrowDown"){e.preventDefault();const nx=emps[empIdx[eid]+1];if(nx)focusRef(rd(nx.id,di,f));return;}
    if(e.key==="ArrowUp"){e.preventDefault();const pv=emps[empIdx[eid]-1];if(pv)focusRef(rd(pv.id,di,f));return;}
    if(e.key==="ArrowRight"){e.preventDefault();if(di<6)focusRef(rd(eid,di+1,f));return;}
    if(e.key==="ArrowLeft"){e.preventDefault();if(di>0)focusRef(rd(eid,di-1,f));return;}

    if((e.key==="Delete"||e.key==="Backspace")&&v){e.preventDefault();updDispo(eid,di,f,"");}
  };

  // ── Day cache ─────────────────────────────────────────────────────────────
  const mkDayCache=(di,newDays)=>{
    const ch=cin[di];if(!ch.ouverture||!ch.fermeture)return null;
    const ouvH=toH(ch.ouverture),ferH=toH(ch.fermeture);if(ouvH===null||ferH===null)return null;

      if(d!==null){if(d<thr)jour+=1;else if(d<params.jourLimite)jour+=params.jourPoids;}
      if(f!==null){if(f>=params.soirDebut&&f<=params.soirLimite)soir+=params.soirPoids;else if(f>params.soirLimite)soir+=1;}
    }
    return{ouvH,ferH,ferEff,thr,jT,sT,jourRond:jT>0&&Number.isInteger(jT),soirRond:sT>0&&Number.isInteger(sT),ferCin,ouvCnt,jour:Math.round(jour*10)/10,soir:Math.round(soir*10)/10};

    if(f!==null){if(f>=c.ferH-EPS)c.ferCin++;if(f>=params.soirDebut&&f<=params.soirLimite)c.soir+=params.soirPoids;else if(f>params.soirLimite)c.soir+=1;c.soir=Math.round(c.soir*10)/10;}

  const _assigner=(newDays,ei,di,cache,wt,plus=false)=>{
    if(!cache)return false;

      return(!jT||j<=jT)&&(!sT||s<=sT);
    };
    const peutOuv=empDebut<=params.genSeuilOuverture+EPS;
    const dOuv=params.genOuvertureFlexible&&peutOuv?toStr(cache.ouvCnt>=params.genNbOuverture?ouvH+params.genDelaiApresOuverture:ouvH):toStr(Math.max(empDebut,ouvH));
    const opts=plus?[
      {d:dOuv,f:toStr(ferH),fc:true,no:true},{d:dOuv,f:toStr(ferEff),fc:false,no:true},
      {d:toStr(14),f:toStr(ferH),fc:true,no:false,s14:true},{d:toStr(14),f:toStr(ferEff),fc:false,no:false,s14:true},
      {d:toStr(18),f:toStr(ferH),fc:true,no:false},{d:toStr(18),f:toStr(ferEff),fc:false,no:false},
      {d:dOuv,f:toStr(20),fc:false,no:true,s20:true},{d:dOuv,f:toStr(18),fc:false,no:true},
      {d:toStr(14),f:toStr(18),fc:false,no:false,s14:true},
    ]:[
      {d:dOuv,f:toStr(ferH),fc:true,no:true},{d:dOuv,f:toStr(ferEff),fc:false,no:true},
      {d:toStr(18),f:toStr(ferH),fc:true,no:false},{d:toStr(18),f:toStr(ferEff),fc:false,no:false},
      {d:dOuv,f:toStr(18),fc:false,no:true},
    ];
    for(const o of opts){
      if(o.s14&&jourRond)continue;if(o.s20&&soirRond)continue;
      if(o.no&&!peutOuv)continue;
      const dv=toH(o.d),fv=toH(o.f);
      const dc=params.genOuvertureFlexible&&peutOuv&&o.no?ouvH:empDebut;
      if(dc>dv+EPS)continue;if(empFin<fv-EPS)continue;
      if(o.fc&&cache.ferCin>=params.genNbFermetureCinema)continue;
      const h=calcH(o.d,o.f);if(h<params.genMinQuart)continue;
      if(!effOK(dv,fv))continue;
      if(wt[ei]+h>getMaxH(emp))continue;
      newDays[ei][di]={debut:o.d,fin:o.f};wt[ei]+=h;updCache(cache,o.d,o.f);return true;
    }
    return false;
  };

  const assignerUnJour=(newDays,ei,di)=>{
    const cache=mkDayCache(di,newDays);if(!cache)return false;
    const wt=[];wt[ei]=newDays[ei].reduce((s,dd)=>s+calcH(dd.debut,dd.fin),0);
    return _assigner(newDays,ei,di,cache,wt,false);
  };

  const genererTous=()=>{
    const newDays=emps.map(e=>e.days.map(d=>({...d})));
    const wt=emps.map((_,ei)=>newDays[ei].reduce((s,dd)=>s+calcH(dd.debut,dd.fin),0));
    const caches=DAYS.map((_,di)=>mkDayCache(di,newDays));
    let assigns=0;
    for(let ei=0;ei<emps.length;ei++)for(let di=0;di<7;di++)if(_assigner(newDays,ei,di,caches[di],wt,false))assigns++;
    cap(emps);setEmps(emps.map((e,i)=>({...e,days:newDays[i]})));commit();
    showMsg(`${assigns} quart${assigns!==1?"s":""} assigné${assigns!==1?"s":""}`);setPage("horaire");
  };

  const runPrioriteFermeture=(newDays)=>{
    let assigns=0;
    for(let di=0;di<7;di++){
      const ch=cin[di];if(!ch.ouverture||!ch.fermeture)continue;
      const ferH=toH(ch.fermeture);
      let covered=false;
      for(let ei=0;ei<emps.length;ei++){const f=toH(newDays[ei][di].fin);if(f!==null&&f>=ferH-EPS){covered=true;break;}}
      if(covered)continue;
      let prio=-1;
      for(let ei=0;ei<emps.length;ei++){
        const emp=emps[ei];if(isBlocked(emp.particularite))continue;
        if(newDays[ei][di].debut||newDays[ei][di].fin)continue;
        const disp=getDispo(emp);const df=disp[di].fin?toH(disp[di].fin):null;
        if(df===null||df<ferH-EPS)continue;
        const h=calcH("18:00",toStr(ferH));
        const wt=newDays[ei].reduce((s,dd)=>s+calcH(dd.debut,dd.fin),0);
        if(h<params.genMinQuart||wt+h>getMaxH(emp))continue;
        newDays[ei][di]={debut:"18:00",fin:toStr(ferH)};prio=ei;assigns++;break;
      }
      if(prio<0)continue;
      for(let ei=emps.length-1;ei>=0;ei--){
        if(ei===prio||isBlocked(emps[ei].particularite))continue;
        const day=newDays[ei][di];if(!day.debut||!day.fin)continue;
        if(toH(day.fin)<params.soirDebut-EPS)continue;
        if(toH(day.debut)<18-EPS){if(calcH(day.debut,"18:00")>=params.genMinQuart)newDays[ei][di]={debut:day.debut,fin:"18:00"};else newDays[ei][di]={debut:"",fin:""};}
        else newDays[ei][di]={debut:"",fin:""};
        break;
      }
    }
    return assigns;
  };

  const genererTousPlus=()=>{
    const newDays=emps.map(e=>e.days.map(d=>({...d})));
    const wt=emps.map((_,ei)=>newDays[ei].reduce((s,dd)=>s+calcH(dd.debut,dd.fin),0));
    const caches=DAYS.map((_,di)=>mkDayCache(di,newDays));
    let assigns=0;
    for(let ei=0;ei<emps.length;ei++)for(let di=0;di<7;di++)if(_assigner(newDays,ei,di,caches[di],wt,true))assigns++;
    assigns+=runPrioriteFermeture(newDays);
    cap(emps);setEmps(emps.map((e,i)=>({...e,days:newDays[i]})));commit();
    showMsg(`${assigns} quarts assignés`);setPage("horaire");
  };

  const genererRééquilibrerJour=(targetDi)=>{
    const newDays=emps.map(e=>e.days.map(d=>({...d})));let changes=0;
    const getEffDay=di=>{const c=mkDayCache(di,newDays);return c?{jour:c.jour,soir:c.soir}:{jour:0,soir:0};};
    const tJ=parseFloat((eff[targetDi].jour||"").replace(",","."))||0;
    const tS=parseFloat((eff[targetDi].soir||"").replace(",","."))||0;
    const isUnder=()=>{const c=getEffDay(targetDi);return(tJ>0&&c.jour<tJ-EPS)||(tS>0&&c.soir<tS-EPS);};
    const tenterRemplacement=(srcDi,excludeEi)=>{
      const srcTJ=parseFloat((eff[srcDi].jour||"").replace(",","."))||0;
      const srcTS=parseFloat((eff[srcDi].soir||"").replace(",","."))||0;
      const sc0=getEffDay(srcDi);
      if(!((srcTJ>0&&sc0.jour<srcTJ-EPS)||(srcTS>0&&sc0.soir<srcTS-EPS)))return true;
      let anyFound=false;
      while(true){
        const sc=getEffDay(srcDi);
        if(!((srcTJ>0&&sc.jour<srcTJ-EPS)||(srcTS>0&&sc.soir<srcTS-EPS)))break;
        let found=false;
        for(let ri=0;ri<emps.length&&!found;ri++){
          if(ri===excludeEi||isBlocked(emps[ri].particularite))continue;
          if(newDays[ri][srcDi].debut||newDays[ri][srcDi].fin)continue;
          const rd2=getDispo(emps[ri]);if(!rd2[srcDi].debut&&!rd2[srcDi].fin)continue;
          if(assignerUnJour(newDays,ri,srcDi)){found=true;anyFound=true;}
        }
        if(!found)break;
      }
      return anyFound;
    };
    for(let ei=0;ei<emps.length;ei++){
      if(!isUnder())break;
      const emp=emps[ei];if(isBlocked(emp.particularite))continue;
      if(newDays[ei][targetDi].debut||newDays[ei][targetDi].fin)continue;
      const dispo=getDispo(emp);if(!dispo[targetDi].debut&&!dispo[targetDi].fin)continue;
      let moved=false;
      for(let srcDi=0;srcDi<7&&!moved;srcDi++){
        if(srcDi===targetDi||!newDays[ei][srcDi].debut||!newDays[ei][srcDi].fin)continue;
        const sv={...newDays[ei][srcDi]};newDays[ei][srcDi]={debut:"",fin:""};
        if(assignerUnJour(newDays,ei,targetDi)){if(tenterRemplacement(srcDi,ei)){changes++;moved=true;}else{newDays[ei][targetDi]={debut:"",fin:""};newDays[ei][srcDi]=sv;}}
        else newDays[ei][srcDi]=sv;
      }
      if(!moved){
        const splitH=18;
        for(let srcDi=0;srcDi<7&&!moved;srcDi++){
          if(srcDi===targetDi)continue;
          const srcDay=newDays[ei][srcDi];if(!srcDay.debut||!srcDay.fin)continue;
          const srcDH=toH(srcDay.debut),srcFH=toH(srcDay.fin);
          if(srcDH===null||srcDH>=params.jourLimite||srcFH===null||srcFH<=params.soirDebut)continue;
          if(calcH(toStr(splitH),srcDay.fin)<params.genMinQuart)continue;
          const chTgt=cin[targetDi];if(!chTgt.ouverture||!chTgt.fermeture)continue;
          const ouvTgt=toH(chTgt.ouverture);
          const dTgt=dispo[targetDi].debut?toH(dispo[targetDi].debut):null;
          const fTgt=dispo[targetDi].fin?toH(dispo[targetDi].fin):null;
          const jD=Math.max(dTgt!==null?dTgt:ouvTgt,ouvTgt);
          const jF=Math.min(fTgt!==null?fTgt:toH(chTgt.fermeture),splitH);
          if(jF-jD<params.genMinQuart)continue;
          const wtEi=newDays[ei].reduce((s,dd)=>s+calcH(dd.debut,dd.fin),0);
          if(wtEi-calcH(srcDay.debut,srcDay.fin)+calcH(toStr(splitH),srcDay.fin)+(jF-jD)>getMaxH(emp))continue;
          const sv={...srcDay};newDays[ei][srcDi]={debut:toStr(splitH),fin:srcDay.fin};newDays[ei][targetDi]={debut:toStr(jD),fin:toStr(jF)};
          if(tenterRemplacement(srcDi,ei)){changes++;moved=true;}else{newDays[ei][targetDi]={debut:"",fin:""};newDays[ei][srcDi]=sv;}
        }
      }
      if(!moved){
        const splitH=18;const tS2=parseFloat((eff[targetDi].soir||"").replace(",","."))||0;
        if(tS2>0&&getEffDay(targetDi).soir<tS2-EPS){
          const fTgt=dispo[targetDi].fin?toH(dispo[targetDi].fin):null;
          const chTgt=cin[targetDi];
          if(chTgt.ouverture&&chTgt.fermeture){
            const ferTgt=toH(chTgt.fermeture);
            if((fTgt!==null?fTgt:ferTgt)>=ferTgt-EPS){
              for(let srcDi=0;srcDi<7&&!moved;srcDi++){
                if(srcDi===targetDi)continue;
                const srcDay=newDays[ei][srcDi];if(!srcDay.debut||!srcDay.fin)continue;
                const srcFH=toH(srcDay.fin);if(srcFH===null||srcFH>splitH+EPS)continue;
                const soirFin=(toH(getFerEff(chTgt.fermeture))??ferTgt);
                if(soirFin-splitH<params.genMinQuart)continue;
                const wtEi=newDays[ei].reduce((s,dd)=>s+calcH(dd.debut,dd.fin),0);
                if(wtEi-calcH(srcDay.debut,srcDay.fin)+(soirFin-splitH)>getMaxH(emp))continue;
                const sv={...srcDay};newDays[ei][srcDi]={debut:"",fin:""};newDays[ei][targetDi]={debut:toStr(splitH),fin:toStr(soirFin)};
                if(tenterRemplacement(srcDi,ei)){changes++;moved=true;}else{newDays[ei][targetDi]={debut:"",fin:""};newDays[ei][srcDi]=sv;}
              }
            }
          }
        }
      }
    }
    cap(emps);setEmps(emps.map((e,i)=>({...e,days:newDays[i]})));commit();
    setShowReequMenu(false);setPage("horaire");
    showMsg(changes>0?`${changes} déplacement${changes!==1?"s":""} effectué${changes!==1?"s":""}`:"Aucun rééquilibrage possible");
  };

  const genererFermeturePrioritaire=()=>{
    const newDays=emps.map(e=>e.days.map(d=>({...d})));
    const assigns=runPrioriteFermeture(newDays);
    cap(emps);setEmps(emps.map((e,i)=>({...e,days:newDays[i]})));commit();
    showMsg(`${assigns} fermeture${assigns!==1?"s":""} assignée${assigns!==1?"s":""}`);setPage("horaire");
  };

  const genererEtirer=(heure,sens)=>{
    const newDays=emps.map(e=>e.days.map(d=>({...d})));let assigns=0;
    for(let di=0;di<7;di++){
      const ch=cin[di];if(!ch.ouverture||!ch.fermeture)continue;
      const ouvH=toH(ch.ouverture),ferH=toH(ch.fermeture);
      const jT=parseFloat((eff[di].jour||"").replace(",","."))||0;
      const sT=parseFloat((eff[di].soir||"").replace(",","."))||0;
      const target=sens==="debut"?jT:sT;if(!target)continue;
      if(sens==="debut"&&jT>0&&Number.isInteger(jT))continue;
      if(sens==="fin"&&sT>0&&Number.isInteger(sT))continue;
      const getCur=()=>{
        const thr=ouvH+params.jourDecalage;let jour=0,soir=0;
        for(let i=0;i<emps.length;i++){
          if(isBlocked(emps[i].particularite))continue;
          const d=toH(newDays[i][di].debut),f=toH(newDays[i][di].fin);
          if(d!==null){if(d<thr)jour+=1;else if(d<params.jourLimite)jour+=params.jourPoids;}
          if(f!==null){if(f>=params.soirDebut&&f<=params.soirLimite)soir+=params.soirPoids;else if(f>params.soirLimite)soir+=1;}
        }
        return{jour:Math.round(jour*10)/10,soir:Math.round(soir*10)/10};
      };
      if((sens==="debut"?getCur().jour:getCur().soir)>=target-EPS)continue;
      for(let ei=0;ei<emps.length;ei++){
        const emp=emps[ei];if(isBlocked(emp.particularite))continue;
        const day=newDays[ei][di];if(!day.debut||!day.fin)continue;
        const disp=getDispo(emp);
        const dH=disp[di].debut?toH(disp[di].debut):null,fH=disp[di].fin?toH(disp[di].fin):null;
        const empDebut=dH!==null?dH:ouvH,empFin=fH!==null?fH:ferH;
        const oldH=calcH(day.debut,day.fin);
        const wt=newDays[ei].reduce((s,dd)=>s+calcH(dd.debut,dd.fin),0);
        if(sens==="debut"){
          if(toH(day.debut)<=heure+EPS||empDebut>heure+EPS)continue;
          if(wt-oldH+calcH(toStr(heure),day.fin)>getMaxH(emp))continue;
          newDays[ei][di]={debut:toStr(heure),fin:day.fin};
        }else{
          if(toH(day.fin)>=heure-EPS||empFin<heure-EPS)continue;
          if(wt-oldH+calcH(day.debut,toStr(heure))>getMaxH(emp))continue;
          newDays[ei][di]={debut:day.debut,fin:toStr(heure)};
        }
        assigns++;if((sens==="debut"?getCur().jour:getCur().soir)>=target-EPS)break;
      }
    }
    cap(emps);setEmps(emps.map((e,i)=>({...e,days:newDays[i]})));commit();
    showMsg(`${assigns} quart${assigns!==1?"s":""} modifié${assigns!==1?"s":""}`);setPage("horaire");
  };

  const genererQuart4h=(type)=>{
    const debut=type==="jour"?"14:00":"18:00";
    const fin=type==="jour"?"18:00":"22:00";
    const dV=toH(debut),fV=toH(fin);
    const newDays=emps.map(e=>e.days.map(d=>({...d})));let assigns=0;
    for(let di=0;di<7;di++){
      const c=mkDayCache(di,newDays);if(!c)continue;
      const{jT,sT}=c;
      const atCap=()=>{if(!jT&&!sT)return false;let j=c.jour,s=c.soir;if(dV!==null){if(dV<c.thr)j+=1;else if(dV<params.jourLimite)j+=params.jourPoids;}if(fV!==null){if(fV>=params.soirDebut&&fV<=params.soirLimite)s+=params.soirPoids;else if(fV>params.soirLimite)s+=1;}return(jT>0&&j>jT+EPS)||(sT>0&&s>sT+EPS);};
      for(let ei=0;ei<emps.length;ei++){
        if(atCap())break;
        const emp=emps[ei];if(isBlocked(emp.particularite))continue;
        if(newDays[ei][di].debut||newDays[ei][di].fin)continue;
        const disp=getDispo(emp);
        const dH=disp[di].debut?toH(disp[di].debut):null,fH=disp[di].fin?toH(disp[di].fin):null;
        if(dH===null&&fH===null)continue;
        if(dH!==null&&dH>dV+EPS)continue;if(fH!==null&&fH<fV-EPS)continue;
        const wt=newDays[ei].reduce((s,dd)=>s+calcH(dd.debut,dd.fin),0);
        if(wt+4>getMaxH(emp))continue;
        newDays[ei][di]={debut,fin};updCache(c,debut,fin);assigns++;
      }
    }
    if(assigns>0){cap(emps);setEmps(emps.map((e,i)=>({...e,days:newDays[i]})));commit();showMsg(`${assigns} quart${assigns!==1?"s":""} 4h assigné${assigns!==1?"s":""}`);}
    else showMsg("Aucun quart 4h possible");
  };

  // ── Render helpers ────────────────────────────────────────────────────────

  const PrioCell=({row})=>(<td style={{textAlign:"center",verticalAlign:"middle",padding:"0 4px"}}><input type="text" value={row.prio===undefined||row.prio===null?"":row.prio} onChange={e=>setEmp(row.id,"prio",e.target.value)} maxLength={3} style={prioS} title="Numéro de priorité PDF"/></td>);
  const rstS=act=>({border:"none",borderBottom:"1px solid #f1f5f9",padding:"9px 10px",cursor:"pointer",fontSize:11,fontWeight:600,width:"100%",textAlign:"left",background:act?"#fef2f2":"#fff",color:act?"#dc2626":"#475569",transition:"background .15s"});
  const defBadge=di=>{

  const stickyProps={cin,eff,effCalcs,wd,params,cfk,setCfk,cinRefs,updCin,blurCin,onCinKD,onPasteCin,setEv,onPasteEff,sep};

  const PanelLeft=(
    <div style={{position:"sticky",top:24,zIndex:100,width:158,background:"#fff",boxShadow:"0 4px 20px rgba(0,0,0,.18)",border:"1.5px solid #e2e8f0",display:"flex",flexDirection:"column",overflow:"hidden",flexShrink:0}}>

  const PanelRight=(
    <div style={{position:"sticky",top:24,zIndex:100,width:158,background:"#fff",boxShadow:"0 4px 20px rgba(0,0,0,.18)",border:"1.5px solid #e2e8f0",display:"flex",flexDirection:"column",overflow:"hidden",flexShrink:0}}>

                      </td>);
                    })}
                    <TotalCell id={row.id}/><DeleteCell id={row.id}/>
                  </tr>);
                })}
              </tbody>
              <tfoot>
                <tr style={{borderTop:"2px solid #c8cdd8",background:"#f8fafc"}}>
                  <td/><td style={{padding:"6px 12px 6px 8px",fontSize:10.5,fontWeight:700,color:"#94a3b8",letterSpacing:"0.5px"}}>TOTAL / JOUR</td>
                  <td style={{borderLeft:"1px solid #c8cdd8"}}/>
                  {dayTotals.map((h,di)=>(<td key={di} style={{textAlign:"center",padding:"10px 6px",...blS(di)}}>{h>0?<span style={{fontSize:12,fontWeight:700,color:"#475569"}}>{fmtH(h)}</span>:<span style={{color:"#e2e8f0"}}>—</span>}</td>))}
                  <td style={{textAlign:"center",padding:"10px 8px"}}><span style={{fontSize:13,fontWeight:800,color:"#0f172a"}}>{fmtH(grand)||"—"}</span></td>
                  <td/>
                </tr>
              </tfoot>
            </table>
            <div style={{padding:"12px 18px",borderTop:"1px solid #d1d5db"}}>
              <button onClick={addEmp} style={{background:"none",border:"1.5px dashed #a0a8b8",borderRadius:0,padding:"8px 18px",fontSize:13,color:"#94a3b8",cursor:"pointer",display:"flex",alignItems:"center",gap:7,fontWeight:500}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#2563eb";e.currentTarget.style.color="#2563eb";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="#a0a8b8";e.currentTarget.style.color="#94a3b8";}}>
                <span style={{fontSize:17,lineHeight:1}}>+</span> Ajouter un équipier
              </button>
            </div>
          </div>
        </>)}

      </div>
      {PanelRight}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
